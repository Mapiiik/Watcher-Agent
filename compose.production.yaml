services:
  watcher-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.production
    image: watcher-agent:production
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8080:8080"

    # ICMP ping + SNMP UDP
    cap_add:
      - NET_RAW
      - NET_ADMIN

    # allow host access (e.g. to connect to local NMS)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
