services:
  watcher-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.production
    restart: unless-stopped
    stop_grace_period: 60s

    env_file:
      - .env

    ports:
      - "80:80"
      - "443:443"

    # ICMP ping + SNMP UDP
    cap_add:
      - NET_RAW
      - NET_BIND_SERVICE

    # allow host access (e.g. to connect to local NMS)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
